apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: duni-httproute
spec:
  parentRefs:
  - name: duni-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: /
    backendRefs:
      - name: app-service
        port: 3000
