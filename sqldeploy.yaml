apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-deploy 
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sql-app
  template:
    metadata:
      labels:
        app: sql-app
    spec:
      containers:
        - name: sql-cont 
          image: mysql:8.0
          ports:
            - containerPort: 3306
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          envFrom:
          - configMapRef:
              name: duni-configmap
          volumeMounts:
            - name: sql-volume 
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: sql-volume 
          persistentVolumeClaim:
            claimName: duni-pvc
        - name: init-script
          configMap:
            name: init-config
---
apiVersion: v1
kind: Service
metadata: 
  name: mariadb
spec:
  type: ClusterIP
  selector:
    app: sql-app
  ports:
    - port: 3306
      targetPort: 3306
