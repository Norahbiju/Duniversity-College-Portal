apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-deploy 
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sql-app
  template:
    metadata:
      labels:
        app: sql-app
    spec:
      containers:
        - name: sql-cont 
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: duni-secret
                  key: MARIADB_ROOT_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: sql-volume 
              mountPath: /var/lib/mysql
      volumes:
        - name: sql-volume 
          persistentVolumeClaim:
            claimName: duni-pvc
---
apiVersion: v1
kind: Service
metadata: 
  name: sql-service 
spec:
  type: ClusterIP
  selector:
    app: sql-app
  ports:
    - port: 3306
      targetPort: 3306
